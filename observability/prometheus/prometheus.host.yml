global:
  scrape_interval: 2s
  evaluation_interval: 2s

# --- JVM / JNI — otel_capture.sh writes file_sd/capture.json (host port 9464+).
scrape_configs:
  - job_name: docker-monitoring-native
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/capture.json
        refresh_interval: 5s

  # --- Syscalls (seccomp_*) — run_seccomp_exporter_demo.sh writes file_sd/seccomp.json
  - job_name: docker-monitoring-seccomp
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/seccomp.json
        refresh_interval: 5s
